<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funny Birthday Card Generator</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #a18cd1);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        margin-bottom: 15px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: #6c63ff;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #5548d9;
      }

      .output {
        margin-top: 15px;
        padding: 15px;
        background: #f3f3f3;
        border-radius: 10px;
        display: none;
        animation: fadeIn 0.5s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎂 Birthday Generator</h1>

      <input type="text" id="name" placeholder="Name" />
      <input type="number" id="age" placeholder="Age" />
      <input type="text" id="hobbies" placeholder="Hobbies (comma separated)" />
      <input
        type="text"
        id="adjective"
        placeholder="Adjective (funny, lazy, cool)"
      />

      <button onclick="generateMessage()">Generate Message</button>

      <div class="output" id="output"></div>
    </div>

    <script>
      function generateMessage() {
        const name = document.getElementById("name").value;
        const age = document.getElementById("age").value;
        const hobbies = document
          .getElementById("hobbies")
          .value.split(",")
          .map((h) => h.trim());
        const adjective = document.getElementById("adjective").value;

        const templates = [
          `Happy ${age}th Birthday, ${name}! 🎉 You're ${adjective} enough to enjoy ${hobbies[0]} but old enough to need a nap after it 😴`,
          `${name}, you're ${age} now?! That's ${adjective}! At this point, ${hobbies[0]} is basically your full-time job 😂`,
          `Wow ${name}, ${age} already! You're aging like ${adjective} fine cheese 🧀 Slightly weird but still awesome!`,
          `Happy Birthday ${name}! At ${age}, being ${adjective} while doing ${hobbies[0]} is your superpower 💪`,
          `${name}, you're now ${age}! Still ${adjective}, just with more experience in ${hobbies.join(", ")} 😆`,
        ];

        const message = templates[Math.floor(Math.random() * templates.length)];

        const outputDiv = document.getElementById("output");
        outputDiv.style.display = "block";
        outputDiv.innerText = message;
      }
    </script>
  </body>
</html>
